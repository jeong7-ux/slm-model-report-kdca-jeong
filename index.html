<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간단 계산기</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f0f0; }
        .calculator { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { padding: 10px; font-size: 18px; width: 200px; margin-bottom: 10px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background: #0056b3; }
        #result { margin-top: 15px; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="expression" placeholder="예: 10 + 5">
        <button onclick="calculate()">계산</button>
        <div id="result"></div>
    </div>
    <script>
        function calculate() {
            const expr = document.getElementById('expression').value;
            fetch('/calculate', { method: 'POST', body: expr })
                .then(r => r.text())
                .then(d => document.getElementById('result').innerText = d);
        }
    </script>
</body>
</html>
